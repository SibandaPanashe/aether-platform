            <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
            <stop offset="60%" style="stop-color:#061020;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#020812;stop-opacity:1" />
        </radialGradient>
        <linearGradient id="zimGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4A843;stop-opacity:0.35" />
            <stop offset="100%" style="stop-color:#F5C842;stop-opacity:0.1" />
