server:
  port: 8080

spring:
  application:
    name: aether

  datasource:
    url: jdbc:postgresql://localhost:5432/aether
    username: postgres
    password: StrongPassword123!
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
    issuer: aether-platform
  document:
    upload-dir: uploads/documents