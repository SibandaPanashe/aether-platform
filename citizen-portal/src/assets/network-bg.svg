<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Aether Deep Blue gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#061020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020812;stop-opacity:1" />
    </radialGradient>
    
    <!-- Zimbabwe Gold gradient -->
    <linearGradient id="zimGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#F5C842;stop-opacity:0.15" />
    </linearGradient>
    
    <!-- Zimbabwe Green accent -->
    <linearGradient id="zimGreen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#319B4A;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:0.08" />
    </linearGradient>
    
    <!-- Zimbabwe Red accent -->
    <linearGradient id="zimRed" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:0.05" />
    </linearGradient>

    <!-- Node glow -->
    <radialGradient id="nodeGlow">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:0" />
    </radialGradient>

    <!-- Connection line style -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)" />
  <rect width="1200" height="800" fill="url(#zimGold)" />
  <rect width="1200" height="800" fill="url(#zimGreen)" />
  <rect width="1200" height="800" fill="url(#zimRed)" />

  <!-- Neural Network Connections -->
  <g stroke="currentColor" fill="none" filter="url(#glow)" opacity="0.35">
    <!-- Horizontal connections -->
    <line x1="100" y1="200" x2="350" y2="150" style="stroke:#D4A843;stroke-width:0.8" />
    <line x1="350" y1="150" x2="600" y2="280" style="stroke:#D4A843;stroke-width:0.6" />
    <line x1="600" y1="280" x2="850" y2="180" style="stroke:#D4A843;stroke-width:0.7" />
    <line x1="850" y1="180" x2="1100" y2="250" style="stroke:#D4A843;stroke-width:0.5" />
    
    <line x1="200" y1="400" x2="450" y2="350" style="stroke:#319B4A;stroke-width:0.7" />
    <line x1="450" y1="350" x2="700" y2="420" style="stroke:#D4A843;stroke-width:0.6" />
    <line x1="700" y1="420" x2="950" y2="380" style="stroke:#319B4A;stroke-width:0.8" />
    <line x1="950" y1="380" x2="1150" y2="450" style="stroke:#D4A843;stroke-width:0.5" />
    
    <line x1="150" y1="600" x2="400" y2="550" style="stroke:#D4A843;stroke-width:0.6" />
    <line x1="400" y1="550" x2="650" y2="620" style="stroke:#C62828;stroke-width:0.5" />
    <line x1="650" y1="620" x2="900" y2="570" style="stroke:#D4A843;stroke-width:0.7" />
    <line x1="900" y1="570" x2="1100" y2="630" style="stroke:#319B4A;stroke-width:0.6" />

    <!-- Vertical / diagonal connections -->
    <line x1="350" y1="150" x2="450" y2="350" style="stroke:#D4A843;stroke-width:0.5" />
    <line x1="600" y1="280" x2="700" y2="420" style="stroke:#319B4A;stroke-width:0.5" />
    <line x1="850" y1="180" x2="950" y2="380" style="stroke:#C62828;stroke-width:0.5" />
    <line x1="200" y1="400" x2="150" y2="600" style="stroke:#D4A843;stroke-width:0.6" />
    <line x1="450" y1="350" x2="400" y2="550" style="stroke:#D4A843;stroke-width:0.5" />
    <line x1="700" y1="420" x2="650" y2="620" style="stroke:#D4A843;stroke-width:0.6" />
    <line x1="950" y1="380" x2="900" y2="570" style="stroke:#319B4A;stroke-width:0.5" />
  </g>

  <!-- Nodes (neurons) -->
  <g>
    <!-- Gold nodes -->
    <circle cx="100" cy="200" r="4" fill="#D4A843" opacity="0.8" />
    <circle cx="350" cy="150" r="5" fill="#D4A843" opacity="0.9" />
    <circle cx="600" cy="280" r="3.5" fill="#D4A843" opacity="0.7" />
    <circle cx="850" cy="180" r="4.5" fill="#D4A843" opacity="0.85" />
    <circle cx="1100" cy="250" r="3" fill="#D4A843" opacity="0.6" />
    <circle cx="450" cy="350" r="4" fill="#D4A843" opacity="0.8" />
    <circle cx="700" cy="420" r="4.5" fill="#D4A843" opacity="0.9" />
    <circle cx="950" cy="380" r="3.5" fill="#D4A843" opacity="0.75" />
    <circle cx="400" cy="550" r="4" fill="#D4A843" opacity="0.8" />
    <circle cx="900" cy="570" r="3" fill="#D4A843" opacity="0.65" />
    <circle cx="150" cy="600" r="4.5" fill="#D4A843" opacity="0.85" />
    <circle cx="1150" cy="450" r="3" fill="#D4A843" opacity="0.55" />

    <!-- Green nodes (Zimbabwe green accent) -->
    <circle cx="200" cy="400" r="3.5" fill="#319B4A" opacity="0.8" />
    <circle cx="650" cy="620" r="4" fill="#319B4A" opacity="0.75" />
    <circle cx="1100" cy="630" r="3" fill="#319B4A" opacity="0.6" />

    <!-- Red nodes (Zimbabwe red accent) -->
    <circle cx="1150" cy="350" r="2.5" fill="#C62828" opacity="0.5" />
    <circle cx="250" cy="580" r="3" fill="#C62828" opacity="0.45" />

    <!-- Glow rings on key nodes -->
    <circle cx="350" cy="150" r="12" fill="url(#nodeGlow)" opacity="0.4" />
    <circle cx="700" cy="420" r="12" fill="url(#nodeGlow)" opacity="0.4" />
    <circle cx="450" cy="350" r="10" fill="url(#nodeGlow)" opacity="0.3" />
    <circle cx="400" cy="550" r="10" fill="url(#nodeGlow)" opacity="0.3" />
  </g>

  <!-- Subtle Zimbabwe bird watermark -->
  <g opacity="0.06" transform="translate(950, 100) scale(0.4)">
    <path d="M0,80 L20,20 L40,80 L60,20 L80,80 L100,20 L120,80 L140,20 L160,80" 
          stroke="#D4A843" stroke-width="3" fill="none" />
    <path d="M20,20 L80,100 L140,20" stroke="#D4A843" stroke-width="2" fill="none" />
  </g>
</svg>
