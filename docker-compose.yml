version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aether-postgres
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d aether"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aether-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aether
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
    ports:
      - "8080:8080"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: aether-ai-service
    environment:
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD}
    ports:
      - "8000:8000"
    volumes:
      - ai_models:/root/.insightface

volumes:
  postgres_data:
  ai_models: